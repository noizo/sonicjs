name = "my-sonicjs-app"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# Cloudflare account
# account_id = "<set-via-CLOUDFLARE_ACCOUNT_ID-env>"

# Cloudflare Workers settings
workers_dev = true

# D1 Database
# Note: database_name and database_id are automatically updated by GitHub Actions
[[d1_databases]]
binding = "DB"
database_name = "sonicjs-worktree-main"
database_id = "PLACEHOLDER_D1_ID_REPLACE_PER_DEPLOY"
migrations_dir = "./migrations"

# R2 Bucket for media storage (using CI bucket)
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sonicjs-ci-media"

# KV Cache (using CI namespace)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "PLACEHOLDER_KV_ID_REPLACE_PER_DEPLOY"

# Environment variables
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:8787"

# Observability
[observability]
enabled = true
